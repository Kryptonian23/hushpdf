AWSTemplateFormatVersion: '2010-09-09'
Description: HushPDF Cognito sandbox for browser authentication with OAuth 2.0 authorization code and PKCE.

Parameters:
  EnvironmentName:
    Type: String
    Default: sandbox
    AllowedPattern: '^[a-z0-9-]+$'
    Description: Lowercase environment label used in resource names.
  DomainPrefix:
    Type: String
    AllowedPattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
    MinLength: 3
    MaxLength: 63
    Description: Globally unique Cognito domain prefix, for example hushpdf-kryptonian23-sandbox.
  CallbackUrl:
    Type: String
    Default: http://localhost:3000/en/account/
    AllowedPattern: '^https?://.+/$'
    Description: Exact HushPDF account callback URL, including its trailing slash.
  LogoutUrl:
    Type: String
    Default: http://localhost:3000/en/account/
    AllowedPattern: '^https?://.+/$'
    Description: Exact HushPDF post-logout URL, including its trailing slash.
  AdditionalCallbackUrl:
    Type: String
    Default: ''
    AllowedPattern: '^$|^https?://.+/$'
    Description: Optional second callback URL, such as the CloudFront staging account page.
  AdditionalLogoutUrl:
    Type: String
    Default: ''
    AllowedPattern: '^$|^https?://.+/$'
    Description: Optional second post-logout URL, such as the CloudFront staging account page.
  BillingScopeIdentifier:
    Type: String
    Default: hushpdf-billing
    AllowedPattern: '^[a-zA-Z0-9._~:/?#\[\]@!$&''()*+,;=-]+$'
    Description: OAuth resource-server identifier shared with the billing API.

Conditions:
  HasAdditionalCallbackUrl: !Not [!Equals [!Ref AdditionalCallbackUrl, '']]
  HasAdditionalLogoutUrl: !Not [!Equals [!Ref AdditionalLogoutUrl, '']]

Resources:
  HushPdfUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      UserPoolName: !Sub hushpdf-${EnvironmentName}
      UserPoolTier: LITE
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: 'OFF'
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      UserPoolTags:
        Application: HushPDF
        Environment: !Ref EnvironmentName

  HushPdfBrowserClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: HushPdfBillingResourceServer
    Properties:
      ClientName: !Sub hushpdf-web-${EnvironmentName}
      UserPoolId: !Ref HushPdfUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - !Sub ${BillingScopeIdentifier}/access
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref CallbackUrl
        - !If [HasAdditionalCallbackUrl, !Ref AdditionalCallbackUrl, !Ref AWS::NoValue]
      LogoutURLs:
        - !Ref LogoutUrl
        - !If [HasAdditionalLogoutUrl, !Ref AdditionalLogoutUrl, !Ref AWS::NoValue]
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 7
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  HushPdfBillingResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: !Ref BillingScopeIdentifier
      Name: !Sub hushpdf-billing-${EnvironmentName}
      UserPoolId: !Ref HushPdfUserPool
      Scopes:
        - ScopeName: access
          ScopeDescription: Access the signed-in user's HushPDF billing resources.

  HushPdfUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      ManagedLoginVersion: 1
      UserPoolId: !Ref HushPdfUserPool

Outputs:
  UserPoolId:
    Description: Value for NEXT_PUBLIC_COGNITO_USER_POOL_ID.
    Value: !Ref HushPdfUserPool
  UserPoolClientId:
    Description: Value for NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID.
    Value: !Ref HushPdfBrowserClient
  CognitoDomain:
    Description: Value for NEXT_PUBLIC_COGNITO_DOMAIN.
    Value: !Sub https://${HushPdfUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com
  AccountCallbackUrl:
    Description: Callback URL registered with the public browser client.
    Value: !Ref CallbackUrl
