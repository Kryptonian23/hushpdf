AWSTemplateFormatVersion: '2010-09-09'
Description: Private S3 and CloudFront hosting for the HushPDF static staging site.

Parameters:
  EnvironmentName:
    Type: String
    Default: staging
    AllowedPattern: '^[a-z0-9-]+$'

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub hushpdf-web-${EnvironmentName}-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: HushPDF
        - Key: Environment
          Value: !Ref EnvironmentName

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: !Sub Private S3 access for HushPDF ${EnvironmentName}
        Name: !Sub hushpdf-${EnvironmentName}-s3-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  HtmlCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub hushpdf-${EnvironmentName}-html
        Comment: Short-lived HTML and route cache for HushPDF staging.
        DefaultTTL: 0
        MaxTTL: 300
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  StaticCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub hushpdf-${EnvironmentName}-static
        Comment: Immutable asset cache for HushPDF staging.
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub hushpdf-${EnvironmentName}-security
        Comment: Security and cross-origin isolation headers required by HushPDF WASM tools.
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: SAMEORIGIN
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          XSSProtection:
            ModeBlock: true
            Override: true
            Protection: true
        CustomHeadersConfig:
          Items:
            - Header: Cross-Origin-Opener-Policy
              Override: true
              Value: same-origin
            - Header: Cross-Origin-Embedder-Policy
              Override: true
              Value: require-corp
            - Header: Cross-Origin-Resource-Policy
              Override: true
              Value: cross-origin
            - Header: Permissions-Policy
              Override: true
              Value: camera=(), microphone=(), geolocation=()

  RouteRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;

          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
          } else if (!uri.substring(uri.lastIndexOf('/') + 1).includes('.')) {
            request.uri = uri + '/index.html';
          }

          return request;
        }
      FunctionConfig:
        Comment: Resolve Next.js static-export directory routes to index.html.
        Runtime: cloudfront-js-2.0
      Name: !Sub hushpdf-${EnvironmentName}-route-rewrite

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub HushPDF ${EnvironmentName} static site
        CustomErrorResponses:
          - ErrorCachingMinTTL: 0
            ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
          - ErrorCachingMinTTL: 0
            ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref HtmlCachePolicy
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RouteRewriteFunction.FunctionARN
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          TargetOriginId: hushpdf-s3-origin
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt SiteBucket.RegionalDomainName
            Id: hushpdf-s3-origin
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        CacheBehaviors:
          - AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: !Ref StaticCachePolicy
            Compress: true
            PathPattern: _next/static/*
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            TargetOriginId: hushpdf-s3-origin
            ViewerProtocolPolicy: redirect-to-https
          - AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: !Ref StaticCachePolicy
            Compress: true
            PathPattern: libreoffice-wasm/*
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            TargetOriginId: hushpdf-s3-origin
            ViewerProtocolPolicy: redirect-to-https
          - AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            CachePolicyId: !Ref StaticCachePolicy
            Compress: true
            PathPattern: images/*
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            TargetOriginId: hushpdf-s3-origin
            ViewerProtocolPolicy: redirect-to-https
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Application
          Value: HushPDF
        - Key: Environment
          Value: !Ref EnvironmentName

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

Outputs:
  BucketName:
    Description: Private S3 bucket that receives the static export.
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution ID used for cache invalidations.
    Value: !Ref SiteDistribution
  DistributionDomainName:
    Description: CloudFront-generated staging hostname.
    Value: !GetAtt SiteDistribution.DomainName
  SiteUrl:
    Description: Public HTTPS staging URL.
    Value: !Sub https://${SiteDistribution.DomainName}
